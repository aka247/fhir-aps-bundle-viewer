<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>FHIR Bundle Viewer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
  <h1 class="mb-4">FHIR Bundle Viewer</h1>
  
  <form action="/" method="post" enctype="multipart/form-data">
    <div class="mb-3">
      <label for="bundle" class="form-label">FHIR-Bundle (JSON) auswählen</label>
      <input class="form-control" type="file" id="bundle" name="bundle" accept=".json" required>
    </div>
    <button type="submit" class="btn btn-primary">Hochladen</button>
  </form>
</body>
</html>
